<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습 데이터 진단 케이스북 · AI 디지털기반 교수학습 데이터 분석</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{
  --bg:#F7F8FA; --surface:#FFFFFF; --surface-2:#FBFBFC;
  --primary:#3E5CE6; --primary-hover:#3349C4; --primary-soft:#EEF1FE;
  --secondary:#0E9F86; --secondary-soft:#EAFBF6;
  --warning:#C77700; --warning-soft:#FEF6E7;
  --danger:#D33A3A; --danger-soft:#FDECEC;
  --purple:#7C4DE0; --purple-soft:#F1EBFE;
  --text:#15181F; --text-soft:#6B7280; --text-faint:#9AA1AC; --border:#E7E9EE;
  --shadow-card:0 1px 2px rgba(16,24,40,.05), 0 1px 3px rgba(16,24,40,.06);
  --shadow-hover:0 8px 20px rgba(16,24,40,.10), 0 2px 6px rgba(16,24,40,.06);
  --radius-sm:9px; --radius-md:14px; --radius-lg:18px;
  --tr:160ms cubic-bezier(.4,0,.2,1);
  --font-sans:'Pretendard',-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
}
[data-theme="dark"]{
  --bg:#0C0E12; --surface:#16181D; --surface-2:#1B1E24;
  --primary-soft:#1D2340; --secondary-soft:#0E2620; --warning-soft:#2B2107; --danger-soft:#2E1414;
  --purple-soft:#241A3D;
  --text:#F0F1F3; --text-soft:#9CA3AF; --text-faint:#6B7280; --border:#262A33;
  --shadow-card:0 1px 2px rgba(0,0,0,.4); --shadow-hover:0 10px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans); background:var(--bg); color:var(--text);
  transition:background var(--tr),color var(--tr); overflow:hidden;
  word-break:keep-all; overflow-wrap:break-word; -webkit-font-smoothing:antialiased;
  font-size:13.5px; line-height:1.5;
}
.icon{display:inline-flex;width:1em;height:1em}
.icon svg{width:100%;height:100%}
.app{display:flex;height:100vh}

/* ===== 사이드바 ===== */
.sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:background var(--tr),border-color var(--tr)}
.sidebar-header{padding:16px 16px 12px}
.brand-row{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.brand-icon{width:30px;height:30px;border-radius:8px;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon .icon{width:16px;height:16px}
.sidebar-header h1{font-size:13.5px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.sidebar-header .subtitle{font-size:11px;color:var(--text-soft);margin-top:1px;font-weight:600}
.practice-notice{font-size:10.5px;font-weight:600;color:var(--warning);
  background:var(--warning-soft);padding:7px 10px;border-radius:7px;margin-top:8px;line-height:1.45}

.grade-select{padding:2px 16px 10px}
.grade-select-label{font-size:9.5px;font-weight:700;color:var(--text-faint);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:6px}
.grade-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.grade-btn{border:1px solid var(--border);background:var(--surface-2);border-radius:7px;padding:6px 0;
  font-family:inherit;font-size:11.5px;font-weight:700;color:var(--text-soft);cursor:pointer;
  transition:background var(--tr),color var(--tr),border-color var(--tr)}
.grade-btn:hover{background:var(--primary-soft)}
.grade-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.subject-tabs{display:flex;gap:5px;padding:0 16px 14px}
.subject-tab{flex:1;border:1px solid var(--border);background:var(--surface-2);border-radius:8px;
  padding:7px 8px;font-family:inherit;font-size:11.5px;font-weight:650;color:var(--text);cursor:pointer;
  transition:background var(--tr),border-color var(--tr);text-align:center}
.subject-tab:hover{background:var(--primary-soft)}
.subject-tab.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

.nav-scroll{flex:1;overflow-y:auto;padding:2px 10px 14px;border-top:1px solid var(--border)}
.nav-group-label{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:700;color:var(--text-faint);
  text-transform:uppercase;letter-spacing:.05em;padding:10px 6px 5px}
.nav-group-label .chip{width:5px;height:5px;border-radius:50%;background:var(--primary);flex-shrink:0}
.nav-group-label.cb2 .chip{background:var(--secondary)}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;
  cursor:pointer;transition:background 120ms ease;border-left:2px solid transparent;margin-bottom:1px}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--primary-soft);border-left-color:var(--primary)}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;color:#fff;letter-spacing:-.02em}
.nav-num-tag{position:absolute;bottom:-2px;right:-2px;min-width:12px;height:12px;padding:0 1px;border-radius:6px;
  background:var(--surface);border:1.2px solid var(--surface);font-size:7px;font-weight:800;
  display:flex;align-items:center;justify-content:center;color:var(--text-soft)}
.nav-text{flex:1;min-width:0}
.nav-title{font-size:12px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sub{font-size:10.5px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== 메인 ===== */
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 28px 8px;
  position:sticky;top:0;background:var(--bg);z-index:20;gap:16px}
.topbar-left{min-width:0;flex:1}
.case-counter{font-size:10.5px;color:var(--text-soft);font-weight:650;background:var(--surface);
  border:1px solid var(--border);padding:2px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.topbar h2{font-size:19px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background var(--tr),transform 350ms ease;flex-shrink:0;color:var(--text)}
.icon-btn .icon{width:15px;height:15px}
.icon-btn:hover{background:var(--surface-2)}
.icon-btn.spin{transform:rotate(180deg)}

/* 단원 브레드크럼 배너 - 전체 폭 */
.unit-banner{display:flex;align-items:center;gap:8px;margin:8px 28px 0;padding:9px 16px;
  background:linear-gradient(90deg,var(--primary-soft),transparent);border:1px solid var(--border);
  border-left:3px solid var(--primary); border-radius:8px;
  font-size:12px;color:var(--text);font-weight:600;flex-wrap:wrap}
.unit-banner .icon{width:14px;height:14px;color:var(--primary);flex-shrink:0}
.unit-crumb{color:var(--text-soft);font-weight:500}
.unit-crumb.sep{color:var(--text-faint);font-weight:400;margin:0 1px}

.content{padding:12px 32px 30px;max-width:1360px}

.stage{background:var(--surface);border-radius:var(--radius-md);padding:18px 20px;box-shadow:var(--shadow-card);
  margin-bottom:10px;animation:riseIn 260ms ease both;transition:box-shadow var(--tr)}
@keyframes riseIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stage-label{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:700;color:var(--text-soft);
  margin-bottom:11px;text-transform:uppercase;letter-spacing:.03em}
.stage-icon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stage-icon .icon{width:13px;height:13px}
.stage-icon.c1{background:var(--danger-soft);color:var(--danger)}
.stage-icon.c2{background:var(--primary-soft);color:var(--primary)}
.stage-icon.c3{background:var(--warning-soft);color:var(--warning)}
.stage-icon.c4{background:var(--secondary-soft);color:var(--secondary)}

.surface-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.big-num{font-size:34px;font-weight:750;color:var(--danger);letter-spacing:-.02em;line-height:1}
.surface-desc{font-size:12.5px;color:var(--text-soft);max-width:520px;line-height:1.5;font-weight:500}
.reveal-btn{margin-top:13px;background:var(--primary);color:#fff;border:none;padding:9px 18px;
  border-radius:var(--radius-sm);font-family:inherit;font-size:12.5px;font-weight:650;cursor:pointer;
  transition:background var(--tr),transform 100ms ease;display:inline-flex;align-items:center;gap:8px}
.reveal-btn .icon{width:13px;height:13px}
.reveal-btn:hover{background:var(--primary-hover)}
.reveal-btn:active{transform:scale(.97)}
.reveal-hint{font-size:11.5px;color:var(--text-faint);margin-top:8px;font-style:italic;line-height:1.4}

.chart-wrap{height:190px;margin-top:2px;position:relative}
.chart-center-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
  pointer-events:none;width:100%}
.chart-center-label .ccl-num{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
.chart-center-label .ccl-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
  margin-top:5px;padding:2px 9px;border-radius:999px}
.ai-conclusion{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;line-height:1.6;padding:11px 14px;
  background:var(--primary-soft);border-radius:8px;margin-top:11px;font-weight:600;color:var(--primary)}
.ai-conclusion .icon{width:15px;height:15px;flex-shrink:0;margin-top:1px}
.ai-detail{font-size:12.5px;line-height:1.6;padding:11px 14px;background:var(--surface-2);border-radius:8px;
  border:1px solid var(--border);margin-top:8px;font-weight:500;color:var(--text-soft)}
.ai-detail strong{color:var(--text);font-weight:700}

.interp-box{font-size:12.5px;line-height:1.65;padding:14px 16px;border-radius:8px;font-weight:500}
.interp-box.good{background:var(--secondary-soft);border:1px solid rgba(14,159,134,.28)}
.interp-box.bad{background:var(--danger-soft);border:1px solid rgba(211,58,58,.28)}
.interp-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:750;padding:3px 9px;
  border-radius:999px;margin-bottom:7px}
.interp-tag.good{background:var(--secondary);color:#fff}
.interp-tag.bad{background:var(--danger);color:#fff}

.altview-box{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;line-height:1.6;padding:13px 15px;
  background:var(--purple-soft);border-radius:8px;margin-top:10px;font-weight:500}
.altview-box .icon{width:16px;height:16px;color:var(--purple);flex-shrink:0;margin-top:1px}
.altview-label{font-size:10px;font-weight:750;color:var(--purple);text-transform:uppercase;letter-spacing:.03em;
  margin-bottom:4px;display:block}

.presc-flow{display:flex;flex-direction:column;gap:8px;margin-top:11px}
.presc-line{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;line-height:1.55;padding:11px 13px;
  border-radius:8px;font-weight:500}
.presc-line.no{background:var(--danger-soft)}
.presc-line.yes{background:var(--secondary-soft)}
.presc-icon{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px}
.presc-icon .icon{width:10px;height:10px}
.presc-line.no .presc-icon{background:var(--danger);color:#fff}
.presc-line.yes .presc-icon{background:var(--secondary);color:#fff}
.presc-line.no{color:#8a2a2a}
[data-theme="dark"] .presc-line.no{color:#f0a8a8}

.framework-bar{display:flex;align-items:stretch;gap:5px;margin-bottom:12px;background:var(--surface);
  border-radius:var(--radius-md);padding:10px 14px;box-shadow:var(--shadow-card)}
.fw-step{flex:1;display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;
  transition:background var(--tr),opacity var(--tr);opacity:.32}
.fw-step.on{opacity:1}
.fw-step[data-k="1"].on{background:var(--danger-soft)}
.fw-step[data-k="2"].on{background:var(--primary-soft)}
.fw-step[data-k="3"].on{background:var(--warning-soft)}
.fw-step[data-k="4"].on{background:var(--secondary-soft)}
.fw-step .fw-icon{width:23px;height:23px;border-radius:50%;background:var(--border);color:var(--text-soft);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--tr),color var(--tr)}
.fw-step .fw-icon .icon{width:12px;height:12px}
.fw-step[data-k="1"].on .fw-icon{background:var(--danger);color:#fff}
.fw-step[data-k="2"].on .fw-icon{background:var(--primary);color:#fff}
.fw-step[data-k="3"].on .fw-icon{background:var(--warning);color:#fff}
.fw-step[data-k="4"].on .fw-icon{background:var(--secondary);color:#fff}
.fw-step .fw-label{font-size:11.5px;font-weight:650;white-space:nowrap}
.fw-arrow{display:flex;align-items:center;color:var(--text-faint);flex-shrink:0}
.fw-arrow .icon{width:12px;height:12px}

/* AI 분석 2단 그리드 */
.ai-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
@media (max-width:820px){ .ai-grid{grid-template-columns:1fr} }
.ai-side{display:flex;flex-direction:column;gap:8px}
.stage-cta{margin:2px 0 10px}

/* 확장 데이터 탭 */
.extra-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.extra-tab{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface-2);
  border-radius:8px;padding:7px 12px;font-family:inherit;font-size:11.5px;font-weight:650;color:var(--text-soft);
  cursor:pointer;transition:background var(--tr),color var(--tr),border-color var(--tr)}
.extra-tab .icon{width:13px;height:13px}
.extra-tab:hover{background:var(--primary-soft)}
.extra-tab.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.extra-note{font-size:11.5px;color:var(--text-faint);margin-bottom:12px;font-style:italic}

/* 감정 기록 */
.emo-row{margin-bottom:14px}
.emo-row-label{font-size:11px;font-weight:700;color:var(--text-soft);margin-bottom:8px}
.emo-dots{display:flex;gap:10px}
.emo-dot{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;padding:8px 4px}
.emo-face{font-size:20px}
.emo-day{font-size:9.5px;color:var(--text-faint);font-weight:600}

/* 챗봇 대화 */
.chat-log{display:flex;flex-direction:column;gap:10px}
.chat-msg{display:flex;flex-direction:column;max-width:82%}
.chat-msg.student{align-self:flex-end;align-items:flex-end}
.chat-msg.ai{align-self:flex-start;align-items:flex-start}
.chat-role{font-size:9.5px;color:var(--text-faint);font-weight:700;margin-bottom:3px;padding:0 3px}
.chat-bubble{padding:9px 13px;border-radius:14px;font-size:12.5px;line-height:1.5;font-weight:500;position:relative}
.chat-msg.student .chat-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.chat-msg.ai .chat-bubble{background:var(--surface-2);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-bubble.flag{box-shadow:0 0 0 2px var(--danger)}
.chat-flag-tag{display:flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;color:var(--danger);
  margin-top:5px;background:var(--danger-soft);padding:2px 7px;border-radius:999px;width:fit-content}
.chat-flag-tag .icon{width:10px;height:10px}

/* 행동 정황 */
.behavior-flag{display:flex;gap:11px;align-items:flex-start;padding:14px 16px;border-radius:10px;font-size:12.5px;line-height:1.6}
.behavior-flag.suspect{background:var(--danger-soft);color:#8a2a2a}
[data-theme="dark"] .behavior-flag.suspect{color:#f0a8a8}
.behavior-flag.none{background:var(--secondary-soft)}
.behavior-flag .icon{width:18px;height:18px;flex-shrink:0;margin-top:1px}
.behavior-flag strong{display:block;margin-bottom:3px;font-size:12.5px}

.case-nav{display:flex;justify-content:space-between;gap:10px;margin-top:14px}
.case-nav-btn{flex:1;display:flex;align-items:center;gap:9px;padding:11px 14px;border-radius:var(--radius-md);
  background:var(--surface);border:1px solid var(--border);cursor:pointer;
  transition:background var(--tr),box-shadow var(--tr),transform 100ms ease;font-family:inherit;text-align:left}
.case-nav-btn:hover{box-shadow:var(--shadow-hover)}
.case-nav-btn:active{transform:scale(.98)}
.case-nav-btn.next{justify-content:flex-end;text-align:right;flex-direction:row-reverse}
.case-nav-btn .cn-arrow{flex-shrink:0;width:16px;height:16px;color:var(--primary)}
.case-nav-btn .cn-text .cn-label{font-size:9.5px;color:var(--text-faint);font-weight:650;text-transform:uppercase;letter-spacing:.03em}
.case-nav-btn .cn-text .cn-name{font-size:12.5px;font-weight:700;margin-top:2px}
.case-nav-btn:disabled{opacity:.3;cursor:default}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@media (max-width:900px){
  .sidebar{width:220px;min-width:220px}
  .content{padding:10px 16px 24px}
  .topbar{padding:14px 16px 6px}
  .unit-banner{margin:8px 16px 0}
}
</style>
</head>

const GRADES = [1,2,3,4,5,6];

let currentGrade = 1;
let currentSetId = ALL_SETS.find(s=>s.grade===1).id;
let currentId = ALL_SETS.find(s=>s.grade===1).cases[0].id;
let currentChart = null;
let revealStage = 1;

const AVATAR_COLORS = ['#3E5CE6','#0E9F86','#C77700','#C23B72','#7C4DE0','#0C8FB3','#5B8A1F','#D9631E'];
function hashColor(name){
  let h = 0;
  for (let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initial(name){
  const clean = name.replace(/[^가-힣A-Za-z]/g,'');
  return clean.slice(-1) || name.slice(-1);
}
function setsForGrade(g){ return ALL_SETS.filter(s => s.grade === g); }
function getSet(){ return ALL_SETS.find(s => s.id === currentSetId); }
function getCases(){ return getSet().cases; }
function getSortedCases(){
  const cases = getCases();
  const isPractice = c => /^p\d/.test(c.id);
  const isClassWide = c => c.name === '학급 전체';
  const classWide = cases.filter(isClassWide);
  const practice = cases.filter(c => isPractice(c) && !isClassWide(c));
  const individual = cases.filter(c => !isPractice(c) && !isClassWide(c));
  return [...classWide, ...individual, ...practice];
}

function renderGradeGrid(){
  const grid = document.getElementById('gradeGrid');
  grid.innerHTML = GRADES.map(g => `<button class="grade-btn ${g===currentGrade?'active':''}" data-grade="${g}">${g}학년</button>`).join('');
  grid.querySelectorAll('.grade-btn').forEach(btn=>{
    btn.addEventListener('click', () => {
      currentGrade = parseInt(btn.dataset.grade);
      currentSetId = setsForGrade(currentGrade)[0].id;
      currentId = getSortedCases()[0].id;
      revealStage = 1;
      render();
    });
  });
}

function renderSubjectTabs(){
  const wrap = document.getElementById('subjectTabs');
  const sets = setsForGrade(currentGrade);
  wrap.innerHTML = sets.map(s => `<button class="subject-tab ${s.id===currentSetId?'active':''}" data-set="${s.id}">${s.label.split('·')[1].trim()}</button>`).join('');
  wrap.querySelectorAll('.subject-tab').forEach(btn=>{
    btn.addEventListener('click', () => {
      currentSetId = btn.dataset.set;
      currentId = getSortedCases()[0].id;
      revealStage = 1;
      render();
    });
  });
}

function renderNav(){
  const nav = document.getElementById('navScroll');
  nav.innerHTML = '';
  const cases = getSortedCases();
  let lastGroup = null;
  cases.forEach((c,i) => {
    const isPractice = /^p\d/.test(c.id);
    const isClassWide = c.name === '학급 전체';
    const group = isClassWide ? 'class' : (isPractice ? 'practice' : 'individual');
    if (group !== lastGroup){
      const label = document.createElement('div');
      label.className = 'nav-group-label' + (group==='practice' ? ' cb2' : '');
      const groupLabel = group==='class' ? '학급 전체' : (group==='practice' ? '실전 실습 사례' : '학생별 진단 사례');
      label.innerHTML = `<span class="chip"></span>${groupLabel}`;
      nav.appendChild(label);
      lastGroup = group;
    }
    const item = document.createElement('div');
    item.className = 'nav-item' + (c.id===currentId?' active':'');
    item.innerHTML = `
      <div class="avatar-wrap">
        <div class="avatar" style="background:${hashColor(c.name+c.id)}">${initial(c.name)}</div>
        <div class="nav-num-tag">${i+1}</div>
      </div>
      <div class="nav-text">
        <div class="nav-title">${c.name}</div>
        <div class="nav-sub">${c.title}</div>
      </div>`;
    item.addEventListener('click', () => { currentId = c.id; revealStage = 1; render(); });
    nav.appendChild(item);
  });
}

function renderUnitBanner(unitStr){
  // "4학년 수학 5단원 · 자료의 정리 · [4수05-02]" 형태를 브레드크럼으로 분해
  const parts = unitStr.split('·').map(s=>s.trim());
  const html = parts.map((p,i) => {
    const sep = i>0 ? '<span class="unit-crumb sep">›</span>' : '';
    return sep + `<span class="${i===0?'':'unit-crumb'}">${p}</span>`;
  }).join(' ');
  document.getElementById('unitBanner').innerHTML = ICONS.cap.replace('<svg','<svg class="icon"') + html;
}

      <button class="case-nav-btn next" id="nextCaseBtn" ${idx===cases.length-1?'disabled':''}>
        <span class="cn-arrow icon">${ICONS.chevronR}</span>
        <div class="cn-text"><div class="cn-label">다음</div><div class="cn-name">${idx<cases.length-1?cases[idx+1].name:'-'}</div></div>
      </button>
    </div>`;
  }

  content.innerHTML = html;

  if (revealStage === 1){
    document.getElementById('revealAiBtn').addEventListener('click', () => { revealStage = 2; render(); });
  }
  if (revealStage >= 2){
    drawChart(c);
    if (c.extraData){
      let activeTab = null;
      const tabsEl = document.getElementById('extraTabs');
      if (tabsEl){
        const firstBtn = tabsEl.querySelector('.extra-tab');
        activeTab = firstBtn.dataset.k;
        renderExtraPanel(c, activeTab);
        tabsEl.querySelectorAll('.extra-tab').forEach(btn=>{
          btn.addEventListener('click', () => {
            tabsEl.querySelectorAll('.extra-tab').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            renderExtraPanel(c, btn.dataset.k);
          });
        });
      }
    }
    if (revealStage === 2){
      document.getElementById('revealInterpBtn').addEventListener('click', () => { revealStage = 3; render(); });
    }
  }
  if (revealStage >= 3){
    const prevBtn = document.getElementById('prevCaseBtn');
    const nextBtn = document.getElementById('nextCaseBtn');
    if (idx > 0) prevBtn.addEventListener('click', () => { currentId = cases[idx-1].id; revealStage = 1; render(); });
    if (idx < cases.length-1) nextBtn.addEventListener('click', () => { currentId = cases[idx+1].id; revealStage = 1; render(); });
  }
}

function renderExtraPanel(c, key){
  const panel = document.getElementById('extraPanel');
  if (!panel) return;
  const ex = c.extraData;
  if (key === 'emotion' && ex.emotion){
    const days = ['4일전','3일전','2일전','어제','오늘'];
    const em = ['😞','😟','😐','🙂','😄'];
    const row = (arr, label) => `
      <div class="emo-row">
        <div class="emo-row-label">${label}</div>
        <div class="emo-dots">${arr.map((v,i)=>`<div class="emo-dot" title="${days[i]}"><div class="emo-face">${em[v-1]}</div><div class="emo-day">${days[i]}</div></div>`).join('')}</div>
      </div>`;
    panel.innerHTML = `
      <div class="extra-note">${ex.emotion.note}</div>
      ${row(ex.emotion.before, '문제 풀기 전')}
      ${row(ex.emotion.after, '문제 풀기 후')}
    `;
  } else if (key === 'chat' && ex.chat){
    panel.innerHTML = `<div class="chat-log">` + ex.chat.map(m => `
      <div class="chat-msg ${m.from}">
        <div class="chat-role">${m.from==='student' ? '학생' : 'AI 학습 도우미'}</div>
        <div class="chat-bubble ${m.flag?'flag':''}">${m.text}${m.flag?`<span class="chat-flag-tag">${ICONS.question} 주목할 문장</span>`:''}</div>
      </div>`).join('') + `</div>`;
  } else if (key === 'behavior' && ex.behavior){
    panel.innerHTML = `
      <div class="behavior-flag ${ex.behavior.flag==='의심'?'suspect':'none'}">
        <span class="icon">${ex.behavior.flag==='의심' ? ICONS.question : ICONS.check}</span>
        <div><strong>${ex.behavior.flag==='의심' ? 'AI 의심 정황 감지' : '특이 정황 없음'}</strong><div>${ex.behavior.note}</div></div>
      </div>`;
  }
}

function palette(isDark){
  return { grid: isDark?'#262A33':'#EEF0F3', tick:isDark?'#9CA3AF':'#8A8F99', font:{family:'Pretendard', size:10.5, weight:'600'} };
}
function setCenterLabel(html){
  const el = document.getElementById('chartCenterLabel');
  if (el) el.innerHTML = html;
}

function axisTitle(text, pal){ return {display:true, text, color:pal.tick, font:{...pal.font, size:11.5}}; }

function drawChart(c){
  if (currentChart){ currentChart.destroy(); currentChart = null; }
  const ctx = document.getElementById('caseChart');
  if (!ctx) return;
  const isDark = document.body.dataset.theme === 'dark';
  const pal = palette(isDark);
  const common = { responsive:true, maintainAspectRatio:false, animation:{duration:500, easing:'easeOutQuart'} };
  const ch = c.chart;
  setCenterLabel('');

  if (ch.type === 'gauge'){
    currentChart = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:['성취도','부족'], datasets:[{data:[ch.value, 100-ch.value], backgroundColor:['#D33A3A', isDark?'#262A33':'#EEF0F3'], borderWidth:0}] },
      options:{...common, cutout:'75%', circumference:180, rotation:270,
        plugins:{legend:{display:false}, tooltip:{enabled:false}}}
    });
    setCenterLabel(`<div class="ccl-num" style="color:var(--danger)">${ch.value}%</div>
      <div class="ccl-tag" style="background:var(--danger-soft);color:var(--danger)">${ICONS.xmark} 성취기준 미도달 경고</div>`);
  } else if (ch.type === 'bar2'){
    const yMax = ch.yMax || 100;
    currentChart = new Chart(ctx, {
      type:'bar',
      data:{labels:ch.labels, datasets:[{data:ch.data, backgroundColor:['#3E5CE6','#B7BCC7'], borderRadius:8, maxBarThickness:64}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`${ch.yLabel||'값'}: ${it.raw}`}}}, scales:{
        y:{beginAtZero:true, max:yMax, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
           title:axisTitle(ch.yLabel||'값', pal)},
        x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font}}}}
    });
  } else if (ch.type === 'bar3'){
    const colors = ['#B7BCC7','#0E9F86','#3E5CE6'];
    currentChart = new Chart(ctx, {
      type:'bar',
      data:{labels:ch.labels, datasets: ch.series.map((s,i)=>({label:s.name, data:s.data, backgroundColor:colors[i], borderRadius:6}))},
      options:{...common, plugins:{legend:{position:'bottom', labels:{color:isDark?'#F0F1F3':'#15181F', font:pal.font, boxWidth:10, padding:10}}},
        scales:{ y:{beginAtZero:true, max:100, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                    title:axisTitle(ch.yLabel||'정답률(%)', pal)},
                 x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font}}}}
    });
  } else if (ch.type === 'radar'){
    currentChart = new Chart(ctx, {
      type:'radar',
      data:{labels:ch.labels, datasets:[{data:ch.data, backgroundColor:'rgba(62,92,230,0.14)', borderColor:'#3E5CE6', borderWidth:2, pointBackgroundColor:'#3E5CE6'}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`${it.label}: ${it.raw}%`}}},
        scales:{r:{beginAtZero:true, max:100, grid:{color:pal.grid}, angleLines:{color:pal.grid}, ticks:{display:false}, pointLabels:{color:isDark?'#F0F1F3':'#15181F', font:pal.font}}}}
    });
  } else if (ch.type === 'scatter'){
    const pts = Array.from({length:20}, (_,i)=>({x:i+1, y: 75+Math.random()*20}));
    pts[8] = {x:9, y:44};
    currentChart = new Chart(ctx, {
      type:'scatter',
      data:{datasets:[{data:pts, backgroundColor: pts.map((p,i)=> i===8?'#D33A3A':'#3E5CE6'), pointRadius:5}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`문항 ${it.raw.x}: 정답률 ${Math.round(it.raw.y)}%`}}},
        scales:{ y:{min:0,max:100, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                    title:axisTitle(ch.yLabel||'정답률(%)', pal)},
                 x:{min:0,max:21, grid:{display:false}, ticks:{color:pal.tick, font:pal.font},
                    title:axisTitle(ch.xLabel||'문항 번호', pal)}}}
    });
  } else if (ch.type === 'item-time'){
    const n = ch.itemCount || 20;
    const avg = ch.avgSec || 1;
    const threshold = ch.thresholdSec || 15;
    const data = Array.from({length:n}, ()=> Math.max(0.3, avg + (Math.random()*avg*0.6 - avg*0.3)));
    currentChart = new Chart(ctx, {
      data:{ labels:data.map((_,i)=>i+1),
        datasets:[
          {type:'bar', data, backgroundColor:'#C77700', borderRadius:4, maxBarThickness:16, order:2, label:'풀이 시간'},
          {type:'line', data:Array(n).fill(threshold), borderColor:'#94A3B8', borderDash:[6,4], borderWidth:2, pointRadius:0, fill:false, order:1, label:'평균적인 풀이 시간'}
        ]},
      options:{...common, plugins:{legend:{display:true, position:'bottom', labels:{color:isDark?'#F0F1F3':'#15181F', font:pal.font, boxWidth:20}}},
        scales:{y:{beginAtZero:true, max:Math.max(threshold*1.3, 10), grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.yLabel||'풀이 시간(초)', pal)},
                x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font, maxTicksLimit:10},
                   title:axisTitle(ch.xLabel||'문항 번호', pal)}}}
    });
  } else if (ch.type === 'idle-timeline'){
    const total = ch.totalMin || 15;
    const stall = ch.stallMin || 10;
    const labels = Array.from({length:total+1}, (_,i)=>i);
    const data = labels.map(m => m <= stall ? 0 : Math.round((m-stall) * (12/(total-stall))));
    currentChart = new Chart(ctx, {
      type:'line',
      data:{labels, datasets:[{data, borderColor:'#C77700', backgroundColor:'rgba(199,119,0,.10)', fill:true, stepped:true, pointRadius:0, borderWidth:2.5}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`${it.raw}자 입력됨`}}},
        scales:{y:{beginAtZero:true, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.yLabel||'누적 입력 글자 수', pal)},
                x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font, maxTicksLimit:8, callback:(v)=>v+'분'},
                   title:axisTitle(ch.xLabel||'경과 시간(분)', pal)}}}
    });
  } else if (ch.type === 'attempt-bar'){
    const n = ch.attempts || 10;
    const start = ch.startAcc || 50;
    const end = ch.endAcc || 80;
    const data = Array.from({length:n}, (_,i)=> Math.round(start + (end-start)*(i/(n-1)) + (Math.random()*8-4)));
    currentChart = new Chart(ctx, {
      type:'bar',
      data:{labels:data.map((_,i)=>i+1), datasets:[{data, backgroundColor:'#3E5CE6', borderRadius:5, maxBarThickness:26}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`${it.raw}% 유사도`}}},
        scales:{y:{beginAtZero:true, max:100, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.yLabel||'정확도(%)', pal)},
                x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.xLabel||'시도 순서', pal)}}}
    });
  } else if (ch.type === 'line-jitter'){
    const lineColor = ch.color === 'danger' ? '#D33A3A' : '#3E5CE6';
    const lineColorBg = ch.color === 'danger' ? 'rgba(211,58,58,.08)' : 'rgba(62,92,230,.08)';
    const data = Array.from({length:30}, ()=> Math.floor(Math.random()*38)+2);
    currentChart = new Chart(ctx, {
      type:'line',
      data:{labels:data.map((_,i)=>i+1), datasets:[{data, borderColor:lineColor, backgroundColor:lineColorBg, fill:true, tension:.3, pointRadius:0, borderWidth:2}]},
      options:{...common, plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.yLabel||'조작 횟수', pal)},
                x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font, maxTicksLimit:6, callback:(v)=>v+'분'},
                   title:axisTitle(ch.xLabel||'경과 시간(분)', pal)}}}
    });
  } else if (ch.type === 'line-emo'){
    currentChart = new Chart(ctx, {
      type:'line',
      data:{labels:['월','화','수','목','금'], datasets:[{data:[85,40,40,40,40], borderColor:'#D33A3A', backgroundColor:'rgba(211,58,58,.08)', fill:true, tension:.4, pointRadius:4, pointBackgroundColor:'#D33A3A', borderWidth:2}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`안정성 ${it.raw}%`}}},
        scales:{y:{beginAtZero:true, max:100, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.yLabel||'정서 안정성(%)', pal)},
                x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.xLabel||'요일', pal)}}}
    });
  } else if (ch.type === 'offtask'){
    const cnt = ch.count || 10;
    const pts = Array.from({length:cnt}, (_,i)=>({x: Math.round(i*40/Math.max(cnt-1,1)), y:1}));
    currentChart = new Chart(ctx, {
      type:'scatter',
      data:{datasets:[{data:pts, backgroundColor:'#D33A3A', pointRadius:7, pointStyle:'rectRot'}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`${it.raw.x}분 지점 이탈`}}},
        scales:{y:{display:false, min:0,max:2}, x:{min:0,max:40, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
          title:{display:true, text:`${ch.xLabel||'수업 진행 시간(분)'} · 이탈 ${cnt}회`, color:pal.tick, font:pal.font}}}}
    });
  } else if (ch.type === 'step-burst'){
    currentChart = new Chart(ctx, {
      type:'line',
      data:{labels:['0초','5초','10초','15초','20초','25초','26초','30초'],
        datasets:[{data:[0,0,0,0,0,0,200,200], borderColor:'#D33A3A', backgroundColor:'rgba(211,58,58,.08)', fill:true, stepped:true, pointRadius:3, borderWidth:2}]},
      options:{...common, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(it)=>`입력된 글자 수: ${it.raw}자`}}},
        scales:{y:{beginAtZero:true, grid:{color:pal.grid}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.yLabel||'입력된 글자 수', pal)},
                x:{grid:{display:false}, ticks:{color:pal.tick, font:pal.font},
                   title:axisTitle(ch.xLabel||'경과 시간', pal)}}}
    });
  } else if (ch.type === 'donut-class'){
    currentChart = new Chart(ctx, {
      type:'doughnut',
      data:{labels:['부정적','중립/긍정'], datasets:[{data:[85,15], backgroundColor:['#D33A3A', isDark?'#262A33':'#EEF0F3'], borderWidth:0}]},
      options:{...common, cutout:'68%', plugins:{legend:{position:'bottom', labels:{color:isDark?'#F0F1F3':'#15181F', font:pal.font, boxWidth:10, padding:10}}}}
    });
    setCenterLabel(`<div class="ccl-num" style="color:var(--danger)">85%</div>
      <div class="ccl-tag" style="background:var(--danger-soft);color:var(--danger)">${ICONS.xmark} 집단 스트레스 경고</div>`);
  }
}

document.getElementById('themeToggle').addEventListener('click', function(){
  const isDark = document.body.dataset.theme === 'dark';
  document.body.dataset.theme = isDark ? 'light' : 'dark';
  this.innerHTML = isDark ? ICONS.moon : ICONS.sun;
  this.classList.add('spin');
  setTimeout(()=>this.classList.remove('spin'), 400);
  setTimeout(()=>{ const c = getCases().find(x=>x.id===currentId); if (revealStage>=2) drawChart(c); }, 50);
});

render();
</script>
</body>
</html>
